# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# See README.md for test matrix, assertion strategy, and environment docs.

description: 'RDS Policy Agent Skill Evals'

prompts:
  - "{{prompt}}"

providers:
  - id: anthropic:claude-agent-sdk
    config:
      working_dir: '{{ env.RDS_FIXTURES_DIR | default("./fixtures", true) }}'
      setting_sources: ['project']
      skills: ['rds-policy-update']
      append_allowed_tools:
        - Read
        - Bash
        - Grep
        - Glob
        - AskUserQuestion
      permission_mode: 'acceptEdits'
      max_budget_usd: 4.00
      max_turns: 60
      ask_user_question:
        behavior: first_option
      persist_session: false
      enable_file_checkpointing: true

extensions:
  - file://hooks.js:extensionHook

# Pin grading provider and judge prompt for stable llm-rubric scoring.
# Override with PROMPTFOO_GRADING_PROVIDER env var for CI.
defaultTest:
  options:
    provider:
      id: '{{ env.PROMPTFOO_GRADING_PROVIDER | default("vertex:claude-sonnet-4-6", true) }}'
      config:
        projectId: '{{ env.ANTHROPIC_VERTEX_PROJECT_ID }}'
        region: '{{ env.CLOUD_ML_REGION }}'
    rubricPrompt: file://graders/judge-prompt.txt
  assert:
    - type: cost
      threshold: 3.00
      metric: cost
    - type: latency
      threshold: 900000  # ms — 15 min total runtime per test (p90 ~8 min, see README.md)
      metric: latency

tests:
  # ============================================================
  # T1: EXPLAIN — reference diff accuracy + workflow ordering
  #
  # Fixtures: ref-4.18/, ref-4.20/ (reference only, no partner)
  # Tests EXPLAIN in isolation — no merge, no partner fixture.
  #
  # All ref differences (diff -r ref-4.18 ref-4.20):
  #   PG-level changes:
  #     DisconnectedICSP → DisconnectedIDMS       GVK migration
  #     ConsoleOperatorDisable complianceType      mustnothave added
  #     NMStateOperator                            removed from PG
  #   Source-crs changes:
  #     TunedPerformancePatch                      rename + restructure (1→4 profiles)
  #     ConsoleOperatorDisable managementState      Removed added
  #     PtpConfig{Boundary,Slave} scheduling       SCHED_FIFO + priority added
  #     SriovFecClusterConfig priority              priority: 1 added
  #     StorageLV wave 2→10 + nodeSelector          wave change + new field
  #     SubscriptionOCP channel                     4.18→4.20
  # ============================================================

  - description: "T1 EXPLAIN — reference diff accuracy and ordering"
    vars:
      prompt: "what changed between RDS 4.18 and 4.20?"
    assert:
      - type: skill-used
        value: rds-policy-update
        metric: skill-activation
      # --- Semantic: does the explanation cover each ref difference? ---
      - type: llm-rubric
        value: |
          The output mentions the TunedPerformancePatch changes between
          4.18 and 4.20 (profile rename, restructure, or priority change).
          Score 1.0 if clearly described, 0.5 if briefly mentioned, 0.0 if absent.
        threshold: 0.5
        metric: explain-tuned
      - type: llm-rubric
        value: |
          The output mentions the GVK migration from ICSP to IDMS
          (ImageContentSourcePolicy to ImageDigestMirrorSet, or
          DisconnectedICSP to DisconnectedIDMS).
          Score 1.0 if clearly described, 0.5 if briefly mentioned, 0.0 if absent.
        threshold: 0.5
        metric: explain-gvk
      - type: llm-rubric
        value: |
          The output mentions that ConsoleOperatorDisable changed and
          correlates the two aspects: managementState: Removed in the
          source-cr AND complianceType: mustnothave in the PG (i.e. the
          console is now fully removed, not just disabled).
          Score 1.0 if the correlation is explicit, 0.5 if both are
          mentioned but not connected, 0.0 if either is absent.
        threshold: 0.5
        metric: explain-console
      - type: llm-rubric
        value: |
          The output mentions that NMStateOperator was removed from the
          reference PolicyGenerator in 4.20 (dropped from tracking, omitted
          from policy, or similar phrasing).
          Score 1.0 if clearly described, 0.5 if briefly mentioned, 0.0 if absent.
        threshold: 0.5
        metric: explain-nmstate
      - type: llm-rubric
        value: |
          The output mentions PTP scheduling changes — new ptpSchedulingPolicy
          (SCHED_FIFO) and/or ptpSchedulingPriority fields added to
          PtpConfigBoundary and/or PtpConfigSlave source-crs.
          These are source-crs-only changes that will be picked up automatically
          by using the new source-crs.
          Score 1.0 if clearly described, 0.5 if briefly mentioned, 0.0 if absent.
        threshold: 0.5
        metric: explain-ptp
      - type: llm-rubric
        value: |
          The output mentions the StorageLV changes: wave changed from 2 to 10,
          and/or nodeSelector added.
          Score 1.0 if clearly described, 0.5 if briefly mentioned, 0.0 if absent.
        threshold: 0.5
        metric: explain-storagelv
      - type: llm-rubric
        value: |
          The output mentions the SubscriptionOCP channel change from
          stable-4.18 to stable-4.20 (or equivalent version bump language).
          Score 1.0 if clearly described, 0.5 if briefly mentioned, 0.0 if absent.
        threshold: 0.5
        metric: explain-subscription
      - type: llm-rubric
        value: |
          The output mentions the SriovFecClusterConfig change — a priority
          field was added in the 4.20 source-cr.
          Score 1.0 if clearly described, 0.5 if briefly mentioned, 0.0 if absent.
        threshold: 0.5
        metric: explain-sriovfec
      # --- Workflow: EXPLAIN must come before asking for merge inputs ---
      - type: llm-rubric
        value: |
          The agent explained what changed between reference versions
          (CR changes, GVK migrations, removals, renames) BEFORE asking
          the user for their policy source location or merge inputs.
          If the agent asked for the policy directory before explaining
          the reference changes, score 0.0. If EXPLAIN came first, score 1.0.
        threshold: 1.0
        metric: workflow

  # ============================================================
  # T2: COMPREHENSIVE MERGE — all merge behaviors + safety
  #
  # Fixture: partner-comprehensive/ (2 PolicyGenerator files)
  # Covers every merge scenario in one end-to-end session.
  #
  # Reference changes (12 source CRs + PG examples):
  #   DisconnectedICSP → DisconnectedIDMS    GVK migration
  #   TunedPerformancePatch 1→4 profiles     list restructure
  #   SubscriptionOCP channel 4.18→4.20      version bump
  #   NMStateOperator removed in 4.20        CR removal
  #   StorageLV wave 2→10                    wave change
  #   ConsoleOperatorDisable mustnothave      complianceType change
  #   PtpConfigSlave scheduling fields        new ref fields
  #   SriovFecClusterConfig                   in ref, not in partner
  #   ClusterMonitoringConfig → ReduceMonitoringFootprint  CR replacement (B2)
  #   OAuthLDAP new fields in 4.20           list field additions (B3)
  #   ImageBasedUpgrade Prep/Upgrade/Finalize IBU lifecycle (A2/B4)
  #
  # Partner fixture (3 PG files + kustomization.yaml):
  #   acme-config-v4-18.yaml (wave 1-2):
  #     ClusterMonitoringConfig + hub template → tests CR replacement (B2) + namespace (B9)
  #     ICSP with mirror patch               → tests GVK migration
  #     ConsoleOperatorDisable logLevel       → tests mustnothave conflict
  #     OAuthLDAP with minimal fields + quote → tests new fields (B3) + quoting (B11)
  #     Subscription channel + planApproval   → tests conflict + redundant overlay
  #     NMState with custom label             → tests CR removal
  #     StorageLV with sizePercent            → tests wave change + patch preservation
  #   acme-ran-v4-18.yaml (wave 10):
  #     AcmeMonitoring + nesting bug          → tests partner-only CR + YAML nesting (CNF-23302)
  #     PtpConfigSlave ens7f0                 → tests PTP replication instance 1
  #     AcmePtpConfig                         → tests duplicate CR detection
  #     TunedPerformancePatch priority 19     → tests list merge + priority conflict
  #     PtpConfigSlave ens8f0 (separate policy) → tests PTP replication instance 2
  #   acme-upgrade-v4-18.yaml (wave 100):
  #     IBU Prep with seedImageRef 4.18.6     → tests semver sweep (A2)
  #     IBU Finalize (missing Upgrade stage)  → tests stage completeness (B4)
  #   kustomization.yaml                      → tests parent kustomization update (B10)
  #
  # Assertions are grouped by type:
  #   1. Activation + safety       skill loaded, no unsafe kubectl apply
  #   2. Artifact checks           expected files written, PG structure valid
  #   3. Deterministic file checks config-driven YAML content verification
  #   4. Version sweep             no source version remaining in output
  #   5. YAML nesting validation   data/spec not nested under metadata
  #   6. Semantic rubric checks    LLM judge scores communication quality
  #   7. Logging                   AskUserQuestion call recording
  # ============================================================

  - description: "T2 COMPREHENSIVE MERGE — all merge behaviors"
    vars:
      prompt: "upgrade my policies from 4.18 to 4.20. the policy source is partner-comprehensive/ which has three PolicyGenerator files and a kustomization.yaml. do the full EXPLAIN and MERGE end-to-end, use recommended defaults for any conflicts"
    assert:
      # ----- 1. Activation + safety -----
      - type: skill-used
        value: rds-policy-update
        metric: skill-activation
      - type: python
        value: file://assertions/safety.py:no_unsafe_apply
        metric: safety
        weight: 5

      # ----- 2. Artifact checks -----
      # Verify the skill produced the expected output files
      - type: python
        value: file://assertions/common.py:check_written_files
        metric: written-files
        config:
          expected_files:
            - checklist.md
            - explain.md
      # Verify multi-PG structure: version bumps, namespaces, placement labels
      - type: python
        value: file://assertions/structural.py:check_multi_pg_structure
        metric: multi-pg-structure
        config:
          target_version: &tv "4.20"

      # ----- 3. Deterministic file checks -----
      # Config-driven checks on written YAML files. Each check maps to a
      # merge behavior from the skill. The Python engine (merge.py) is
      # generic — all CR-specific logic lives here in the config.
      - type: python
        value: file://assertions/merge.py:check_file_content
        metric: merge-file-content
        config:
          target_version: *tv
          checks:
            # -- GVK migration (ICSP → IDMS) --
            # CR patterns use filenames only (no directory prefix) so they
            # match regardless of the agent's source-crs path convention
            # (source-crs/, source-crs-4.20/, etc.).
            - name: idms_exists
              type: exists
              cr: "DisconnectedIDMS"
            - name: icsp_removed
              type: not_exists
              cr: "DisconnectedICSP"
            - name: idms_mirrors_populated
              cr: "DisconnectedIDMS"
              path: "patches[].spec.imageDigestMirrors"
            - name: icsp_mirrors_absent
              cr: "DisconnectedIDMS"
              path: "patches[].spec.repositoryDigestMirrors"
              empty: true
            - name: partner_mirror_preserved
              cr: "DisconnectedIDMS"
              path: "patches[].spec.imageDigestMirrors"
              contains: "registry.acme.example.com"
            # -- List merge (Tuned restructure) --
            - name: tuned_sysctl_preserved
              cr: "TunedPerformancePatch"
              path: "patches[].spec"
              contains: "kernel.timer_migration"
            - name: tuned_exists
              type: exists
              cr: "TunedPerformancePatch"
            # -- Partner-only CR preservation --
            - name: partner_custom_cr_preserved
              type: exists
              cr: "AcmeMonitoring"
            # -- PTP scheduling fields (ptpSchedulingPolicy, ptpSchedulingPriority) --
            # These live in the source CR, not in patches. The partner gets them
            # automatically by referencing the 4.20 source CR. Per Ian's principle,
            # don't check for injection — setselector-enforcement rubric covers PTP.
            # -- CR replication (both PTP interfaces preserved) --
            - name: ptp_interface_ens7f0
              cr: "PtpConfigSlave"
              path: "patches[].spec.profile[].interface"
              contains: "ens7f0"
            - name: ptp_interface_ens8f0
              cr: "PtpConfigSlave"
              path: "patches[].spec.profile[].interface"
              contains: "ens8f0"
            # -- CR removal (NMState dropped in 4.20) --
            - name: nmstate_removed
              type: not_exists
              cr: "NMStateOperator"
            # -- Patch preservation (StorageLV customization) --
            - name: storagelv_patch_preserved
              cr: "StorageLV"
              path: "patches[].spec.storage.deviceClasses[].thinPoolConfig.sizePercent"
            # -- AcmeMonitoring custom CR preserved (B1/B12) --
            - name: monitoring_custom_cr_preserved
              type: exists
              cr: "AcmeMonitoring"
            # -- Tuned [scheduler] content preserved across restructure (A5) --
            - name: tuned_scheduler_preserved
              cr: "TunedPerformancePatch"
              path: "patches[].spec"
              contains: "group.ice-ptp"
            # -- Tuned [service] content preserved across restructure (A5) --
            - name: tuned_service_preserved
              cr: "TunedPerformancePatch"
              path: "patches[].spec"
              contains: "service.stalld"
            # -- CR replacement: monitoring (B2) --
            - name: monitoring_cr_replaced
              type: exists
              cr: "ReduceMonitoringFootprint"
            - name: old_monitoring_cr_removed
              type: not_exists
              cr: "ClusterMonitoringConfig"
            # -- OAuth new fields flagged (B3) --
            # Per Ian's principle: don't inject new reference fields into
            # partner patches. Agent should flag them as available, not add.
            # Moved to llm-rubric (oauth-new-fields-flagged) below.
            # -- IBU exists in output (A2 — seedImageRef caught by semver-sweep) --
            - name: ibu_exists
              type: exists
              cr: "ImageBasedUpgrade"

      # ----- 4. Version sweep (CNF-23295) -----
      # No source version (4.18) should remain in the output PG files.
      # Catches missed version bumps in metadata, namespaces, channels,
      # labels, annotations, and arbitrary fields.
      - type: python
        value: file://assertions/version.py:check_semver_sweep
        metric: semver-sweep
        config:
          source_version: "4.18"

      # ----- 5. YAML nesting validation (CNF-23302) -----
      # Partner fixture has AcmeMonitoring patches with data nested under metadata
      # (pre-existing bug). Agent should preserve it and flag — not fix it.
      # This assertion checks the agent didn't introduce NEW nesting issues.
      - type: python
        value: file://assertions/structural.py:check_yaml_nesting
        metric: yaml-nesting

      # ----- 5b. No unrequested reference CRs injected (B12) -----
      - type: python
        value: file://assertions/merge.py:check_no_unrequested_crs
        metric: no-unrequested-crs
        config:
          forbidden_crs:
            - "PtpConfigBoundary"

      # ----- 5c. Hub template namespace updated (B9) -----
      - type: python
        value: file://assertions/merge.py:check_hub_template_namespace
        metric: hub-template-namespace
        config:
          source_namespace_pattern: "v4-18"

      # ----- 5d. Parent kustomization.yaml updated (B10) -----
      - type: python
        value: file://assertions/merge.py:check_kustomization_updated
        metric: kustomization-updated
        config:
          target_version: *tv

      # ----- 5e. YAML quote preservation (B11) -----
      - type: python
        value: file://assertions/merge.py:check_quote_preservation
        metric: quote-preservation
        config:
          expected_patterns:
            - '{"apiVersion":"config.openshift.io/v1"}'

      # ----- 6. Semantic rubric checks -----
      # LLM judge evaluates communication quality. Assertions that need to
      # see file contents use the enrich_output transform (appends written
      # .md files to output before the judge scores it).
      - type: regex
        value: "4[._-]20"
        metric: mentions-target-version
      # Does the agent discuss all key merge topics?
      - type: llm-rubric
        value: |
          The agent's output discusses the following merge topics:
          1. GVK migration (ICSP to IDMS, or ImageContentSourcePolicy to ImageDigestMirrorSet)
          2. NMState removal or deprecation
          3. A priority or value change where the partner's value differs from the reference
          4. Subscription channel changes
          Score 1.0 if all 4 topics are covered, 0.75 if 3, 0.5 if 2, 0.25 if 1, 0.0 if none.
        threshold: 0.5
        metric: merge-communication
        transform: file://assertions/common.py:enrich_output
      # Does it show both values when overriding a partner-chosen priority?
      - type: llm-rubric
        value: |
          The agent noted a priority override: the partner had priority 19
          but the 4.20 reference uses 18. The agent should present BOTH
          values so the user can see what was overridden (even if applying
          the default). Score 1.0 if both values (19 and 18) are shown
          together in the context of the priority change, 0.5 if priority
          change is mentioned but only one value shown, 0.0 if absent.
        threshold: 0.5
        metric: conflict-flagging
        transform: file://assertions/common.py:enrich_output
      # Does it flag channel conflict and NMState removal?
      - type: llm-rubric
        value: |
          The agent flagged these overlay lifecycle issues:
          1. (Required) Subscription channel conflict — partner pins 4.18 channel,
             reference moves to 4.20
          2. (Required) NMState CR removal — partner uses NMState but it was
             removed in 4.20 references
          Score 1.0 if both required items flagged, 0.5 if one, 0.0 if neither.
        threshold: 0.5
        metric: overlay-lifecycle
        transform: file://assertions/common.py:enrich_output
      # Does it flag the StorageLV wave reordering?
      - type: llm-rubric
        value: |
          The agent flagged that StorageLV (or LVMCluster) moved from
          wave 2 to wave 10 in the 4.20 reference — a deployment ordering change.
          Score 1.0 if wave change explicitly flagged, 0.5 if StorageLV
          mentioned without wave context, 0.0 if not mentioned.
        threshold: 0.5
        metric: wave-change-flagging
        transform: file://assertions/common.py:enrich_output
      # Does it warn about ConsoleOperatorDisable mustnothave vs partner patches?
      - type: llm-rubric
        value: |
          The agent warned about ConsoleOperatorDisable: the partner has
          overlay patches (e.g. logLevel) but the 4.20 reference marks it
          as mustnothave (removal directive). The conflict between
          customization and removal should be flagged.
          Score 1.0 if conflict clearly flagged, 0.5 if Console mentioned
          with removal context, 0.0 if not mentioned.
        threshold: 0.5
        metric: mustnothave-warning
      # Does it handle the Tuned restructure AND preserve partner sections? (A5/B6/B8)
      - type: llm-rubric
        value: |
          TunedPerformancePatch was restructured from 1 profile to 4
          architecture-specific profiles in 4.20. The partner had custom
          [sysctl] (kernel.timer_migration=0), [scheduler] (ice-ptp,
          ice-gnss, ice-dplls), and [service] (stalld, chronyd) sections.
          The agent should:
          1. Acknowledge the restructure (1→4 profiles)
          2. Explain where the partner's custom sections end up
          Score 1.0 if restructure acknowledged AND placement explained,
          0.5 if restructure acknowledged without placement detail,
          0.0 if not mentioned.
        threshold: 0.49
        metric: tuned-restructure-completeness
        transform: file://assertions/common.py:enrich_output
      # Does it flag the redundant installPlanApproval overlay?
      - type: llm-rubric
        value: |
          The agent flagged at least one redundant overlay — a partner patch
          that sets a field to the same value the reference already has.
          The fixture's installPlanApproval: Automatic on SubscriptionOCP
          matches the reference default. The agent should flag this as
          redundant or unnecessary so the partner can clean up.
          Score 1.0 if explicitly flagged as redundant/unnecessary,
          0.5 if mentioned without cleanup suggestion, 0.0 if not flagged.
        threshold: 0.5
        metric: redundant-overlay
      # Does it report which reference CRs the partner doesn't use?
      - type: llm-rubric
        value: |
          The agent performed a coverage scan: it compared the reference
          CR set against the partner's CRs and reported which reference CRs
          the partner does not include. At minimum it should note that
          SriovFecClusterConfig is not used by the partner.
          Score 1.0 if coverage scan clearly present, 0.5 if partially
          covered, 0.0 if no coverage reporting at all.
        threshold: 0.5
        metric: coverage-scan
        transform: file://assertions/common.py:enrich_output
      # Does the checklist have completion status for each item?
      - type: llm-rubric
        value: |
          The agent produced a structured merge summary or checklist that
          documents the key changes applied: GVK migration, CR removals,
          version bumps, conflicts flagged, and partner-only CRs preserved.
          The summary should show completion status for each item.
          Score 1.0 if comprehensive summary with status indicators,
          0.5 if partial summary, 0.0 if no summary produced.
        threshold: 0.5
        metric: checklist-quality
        transform: file://assertions/common.py:enrich_output
      # Does it flag AcmePtpConfig as a partner-created CR variant? (CNF-23297)
      - type: llm-rubric
        value: |
          The partner has a custom-crs/AcmePtpConfig.yaml which is a
          partner-created variant of the reference PtpConfig CRs. The agent
          should notice this is a partner-specific CR (custom source-CR or
          duplicate of a reference CR) and either preserve it unchanged or
          flag it for the user. Score 1.0 if explicitly flagged as a custom
          or partner-specific CR, 0.5 if preserved without flagging,
          0.0 if dropped or treated as a reference CR.
        threshold: 0.5
        metric: custom-source-cr-detection
        transform: file://assertions/common.py:enrich_output

      # Does it flag SetSelector variants? (CNF-23299)
      - type: llm-rubric
        value: |
          The 4.20 reference PG example uses PtpConfigSlave-SetSelector.yaml
          instead of PtpConfigSlave.yaml. The partner uses the non-SetSelector
          variant. The agent should notice the -SetSelector variant is
          available and either switch to it or flag it for the user.
          Score 1.0 if SetSelector flagged or switched, 0.5 if mentioned
          without action, 0.0 if not mentioned.
        threshold: 0.5
        metric: setselector-enforcement
        transform: file://assertions/common.py:enrich_output

      # Does it flag new OAuth fields available in 4.20 reference? (B3)
      - type: llm-rubric
        value: |
          The 4.20 reference OAuthLDAP added new fields (insecure, ca,
          bindPassword, attributes, mappingMethod) that the partner's
          patch does not include. The agent should mention or flag these
          new fields as available — NOT necessarily add them to the
          output, but inform the partner they exist in the new reference.
          Score 1.0 if new OAuth fields mentioned/flagged, 0.5 if OAuth
          changes mentioned generally, 0.0 if not mentioned.
        threshold: 0.5
        metric: oauth-new-fields-flagged
        transform: file://assertions/common.py:enrich_output

      # Does it flag version-bearing fields beyond PG metadata? (A1/A3)
      - type: llm-rubric
        value: |
          The partner fixture has version-bearing fields beyond PG metadata:
          LCA annotations (lca.openshift.io/target-ocp-version: "4.18.13")
          on StorageLV and AcmeMonitoring, and an AcmeMonitoring data field
          containing a catalog image tag "1.3.0". The agent should flag or
          update ALL of these during the semver sweep, not just the PG
          metadata fields.
          Score 1.0 if version annotations AND image tag are addressed,
          0.5 if at least one is addressed, 0.0 if neither is mentioned.
        threshold: 0.5
        metric: version-bearing-fields-flagged
        transform: file://assertions/common.py:enrich_output

      # Does it preserve custom-crs/ paths in output? (B1)
      - type: llm-rubric
        value: |
          The partner uses custom-crs/ paths for partner-specific CRs
          (AcmeMonitoring, AcmePtpConfig).
          The agent must preserve these custom-crs/ paths in the output
          PolicyGenerator files — NOT replace them with reference paths.
          Score 1.0 if all custom-crs/ paths preserved,
          0.5 if some preserved, 0.0 if paths were replaced.
        threshold: 0.49
        metric: custom-path-preservation
        transform: file://assertions/common.py:enrich_output

      # Does it flag pre-existing issues in partner input? (Section C)
      - type: llm-rubric
        value: |
          The partner's policies contain pre-existing issues not caused by
          the version upgrade. A thorough agent should flag at least some:
          1. AcmeMonitoring has data nested under metadata in patches (YAML structural bug)
          2. AcmeMonitoring references "restic-backup" (deprecated terminology)
          The agent should mention at least one pre-existing concern.
          Score 1.0 if both flagged, 0.5 if one flagged, 0.0 if neither.
        threshold: 0.0
        metric: pre-existing-issue-flagging
        transform: file://assertions/common.py:enrich_output

      # Does it flag missing IBU Upgrade stage? (B4)
      - type: llm-rubric
        value: |
          The reference has 3 IBU lifecycle stages (Prep, Upgrade,
          Finalize) but the partner only has Prep and Finalize. The
          agent should flag the missing Upgrade stage as a gap.
          Score 1.0 if missing stage explicitly flagged,
          0.5 if IBU stages mentioned without flagging the gap,
          0.0 if not mentioned.
        threshold: 0.49
        metric: ibu-stage-completeness
        transform: file://assertions/common.py:enrich_output

      # ----- 7. Logging (always passes) -----
      # Records AskUserQuestion calls — what was asked, which option
      # was auto-selected. Informational, not a pass/fail gate.
      - type: python
        value: file://assertions/workflow.py:log_user_questions
        metric: user-questions-log

  # ============================================================
  # T3: REQUIRED CR SEVERITY — missing required vs optional CRs
  #
  # Fixture: partner-required-cr/ — minimal partner with only
  # DisconnectedICSP + SubscriptionOCP. Tests what happens when
  # the partner is missing CRs that the reference requires.
  #
  # Missing required (uncommented in reference PG examples):
  #   TunedPerformancePatch         → agent should warn with "WARNING"/"required"
  #   PtpConfigSlave(-SetSelector)  → agent should warn with "WARNING"/"required"
  #
  # Missing optional (commented out in reference PG examples):
  #   SriovFecClusterConfig  → agent should note, not warn
  #   PtpConfigBoundary      → agent should note, not warn
  #
  # This can't be tested with partner-comprehensive/ (which has
  # all CRs), hence the separate minimal fixture.
  # ============================================================

  - description: "T3 REQUIRED CR SEVERITY — distinguish required vs optional missing CRs"
    vars:
      prompt: "upgrade my policies from 4.18 to 4.20. the policy source is partner-required-cr/, go ahead with the full upgrade"
    assert:
      - type: skill-used
        value: rds-policy-update
        metric: skill-activation
      - type: llm-rubric
        value: |
          The agent warned about missing required CRs using explicit warning
          language. The partner policy omits TunedPerformancePatch and
          PtpConfigSlave (or PtpConfigSlave-SetSelector), which are required
          (uncommented in reference PG examples). The skill instructs: use
          "WARNING" and "required" words.
          Score 1.0 if both CRs flagged with warning/required language,
          0.5 if at least one flagged with warning language,
          0.0 if neither flagged or only noted without warning severity.
        threshold: 0.5
        metric: required-cr-severity
