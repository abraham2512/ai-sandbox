apiVersion: v1
kind: ConfigMap
metadata:
  name: acme-monitoring-config
  namespace: acme-monitoring
  annotations:
    ran.openshift.io/ztp-deploy-wave: "10"
  labels:
    lca.openshift.io/target-ocp-version: "4.18.13"
data:
  monitoring.conf: |
    interval=30
    endpoint=https://monitor.acme.example.com
  restic-backup: "enabled"
  catalog-image: "registry.acme.example.com/catalogs/sno-operator-index:1.3.0"
