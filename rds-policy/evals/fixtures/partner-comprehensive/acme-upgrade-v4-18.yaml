apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: acme-upgrade-v4-18
policyDefaults:
  namespace: ztp-acme-v4-18
  placement:
    labelSelector:
      cluster-version: "v4.18"
      acme-policy: "v1"
  remediationAction: inform
policies:
- name: acme-upgrade-prep
  policyAnnotations:
    ran.openshift.io/ztp-deploy-wave: "100"
  manifests:
    - path: source-crs/ImageBasedUpgrade.yaml
      patches:
      - spec:
          stage: Prep
          seedImageRef:
            version: "4.18.6"
            image: "registry.example.com/seed:4.18.6"
- name: acme-upgrade-finalize
  policyAnnotations:
    ran.openshift.io/ztp-deploy-wave: "100"
  manifests:
    - path: source-crs/ImageBasedUpgrade.yaml
      patches:
      - spec:
          stage: Finalize
