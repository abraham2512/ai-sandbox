apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
  annotations:
    ran.openshift.io/ztp-deploy-wave: "2"
spec:
  identityProviders:
  - name: ldap-provider
    type: LDAP
    mappingMethod: add
    ldap:
      url: "ldap://ldap.example.com"
      bindDN: "cn=admin,dc=example,dc=com"
      insecure: false
      ca:
        name: ldap-ca
      attributes:
        email:
        - mail
        id:
        - dn
        name:
        - cn
        preferredUsername:
        - uid
