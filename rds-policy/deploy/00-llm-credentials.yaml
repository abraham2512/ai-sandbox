# Vertex AI credentials for the agentic operator.
#
# Create from a GCP application default credentials file:
#   kubectl create secret generic vertex-ai-credentials \
#     -n openshift-lightspeed \
#     --from-file=credentials.json=~/.config/gcloud/application_default_credentials.json
#
# The key MUST be "credentials.json" — the operator mounts it at
# /var/secrets/google/credentials.json and sets GOOGLE_APPLICATION_CREDENTIALS.
---
apiVersion: v1
kind: Secret
metadata:
  name: vertex-ai-credentials
  namespace: openshift-lightspeed
type: Opaque
data:
  credentials.json: <BASE64_ENCODED_CREDENTIALS_JSON>
