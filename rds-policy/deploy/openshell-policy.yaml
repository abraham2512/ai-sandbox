version: 1
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /etc
    - /opt
    - /app
    - /proc
    - /dev/urandom
  read_write:
    - /tmp
    - /sandbox
    - /dev/null
  process:
    run_as_user: sandbox
    run_as_group: sandbox

network_policies:
  vertex_ai:
    name: google-vertex-ai
    endpoints:
      - host: "*.googleapis.com"
        port: 443
      - host: "*.google.com"
        port: 443
    binaries:
      - path: "*"
  general_https:
    name: general-https
    endpoints:
      - host: "*"
        port: 443
    binaries:
      - path: "*"
